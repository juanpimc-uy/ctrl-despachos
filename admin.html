<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTRL DESPACHOS — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #d4ff00;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --success: #00e676;
    --danger: #ff3d3d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); }

  .header-right {
    margin-left: auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 57px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .project-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .project-list::-webkit-scrollbar { width: 4px; }
  .project-list::-webkit-scrollbar-track { background: transparent; }
  .project-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .project-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
  }

  .project-card:hover { border-color: var(--accent); }
  .project-card.active { border-color: var(--accent); background: #1e2200; }

  .project-card-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .project-card-meta {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 700;
  }

  .badge-pending { background: #2a2000; color: #ffb800; border: 1px solid #3a3000; }
  .badge-complete { background: #002a10; color: var(--success); border: 1px solid #003a18; }

  .progress-mini {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .content {
    overflow-y: auto;
    padding: 32px;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .empty-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .project-detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
  }

  .project-detail-name {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.2;
  }

  .project-detail-date {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 4px;
  }

  .action-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .progress-bar-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .progress-stats {
    display: flex;
    gap: 32px;
    margin-bottom: 16px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-fill.complete { background: var(--success); }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .bulto-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
  }

  .bulto-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: all 0.15s;
  }

  .bulto-card.scanned {
    border-color: #003a18;
    background: #001a0a;
  }

  .bulto-num {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .bulto-card.scanned .bulto-num { color: var(--success); }

  .bulto-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.3;
  }

  .bulto-status {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  .bulto-card.scanned .bulto-status { color: var(--success); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(10px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-family: 'Space Mono', monospace;
  }

  input, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }

  input:focus, textarea:focus { border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  btn, .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #c8f200; }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--text); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  .btn-danger:hover { background: var(--danger); color: #fff; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    padding: 6px 10px;
  }

  .btn-ghost:hover { color: var(--text); }

  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }

  .upload-zone:hover { border-color: var(--accent); }

  .upload-zone p { font-size: 13px; color: var(--muted); margin-top: 8px; }

  /* Print styles - 60x30mm labels */
  @media print {
    @page {
      size: 60mm 30mm;
      margin: 0;
    }

    html, body {
      width: 60mm;
      height: 30mm;
      background: white;
    }

    .no-print { display: none !important; }

    .print-grid {
      display: block !important;
      width: 60mm;
    }

    .print-label {
      width: 60mm;
      height: 30mm;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 2mm;
      padding: 2mm 3mm;
      page-break-after: always;
      background: white;
      overflow: hidden;
    }

    .print-label canvas {
      width: 26mm !important;
      height: 26mm !important;
      flex-shrink: 0;
    }

    .print-label-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1mm;
      overflow: hidden;
    }

    .print-label .label-project {
      font-size: 9px;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: monospace;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .print-label .label-num {
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      line-height: 1.1;
      color: #000;
    }

    .print-label .label-total {
      font-size: 8px;
      color: #555;
      font-family: monospace;
    }

    .print-label .label-desc {
      font-size: 7px;
      color: #444;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  }

  .print-preview {
    display: none;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    z-index: 9999;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }

  .loading {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .no-projects {
    padding: 32px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<header class="no-print">
  <div class="logo">CTRL<span>/</span>DESPACHOS <span style="color:#333;margin-left:8px;">ADMIN</span></div>
  <div class="header-right">
    <button class="btn btn-primary" onclick="openNewProject()">+ Nuevo proyecto</button>
  </div>
</header>

<div class="main no-print">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Proyectos</span>
      <span class="loading" id="loadingProjects" style="display:none"></span>
    </div>
    <div class="project-list" id="projectList">
      <div class="no-projects">Cargando...</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="empty-state">
      <div class="empty-icon">📦</div>
      <div class="empty-text">Seleccioná un proyecto</div>
    </div>
  </div>
</div>

<!-- Modal nuevo proyecto -->
<div class="modal-overlay" id="modalNewProject">
  <div class="modal">
    <div class="modal-title">
      Nuevo proyecto
      <button class="btn btn-ghost" onclick="closeModal('modalNewProject')">✕</button>
    </div>
    <label>Nombre del proyecto *</label>
    <input type="text" id="newProjectName" placeholder="Ej: Despacho Cocina López">
    <label>Descripción (opcional)</label>
    <textarea id="newProjectDesc" rows="2" placeholder="Notas adicionales..."></textarea>
    <hr class="divider">
    <div class="section-title" style="margin-bottom:12px">Cargar bultos</div>
    <div class="form-row">
      <div>
        <label>Cantidad de bultos *</label>
        <input type="number" id="newBultoCount" placeholder="Ej: 10" min="1">
      </div>
      <div>
        <label>Descripción base (opcional)</label>
        <input type="text" id="newBultoDesc" placeholder="Ej: Herrajes cocina">
      </div>
    </div>
    <hr class="divider">
    <div class="section-title" style="margin-bottom:12px">O cargar desde Excel</div>
    <div class="upload-zone" onclick="document.getElementById('excelInput').click()">
      📊
      <p>Hacer clic para subir archivo Excel</p>
      <p style="font-size:11px;margin-top:4px">Columnas: numero, descripcion</p>
    </div>
    <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="loadExcel(event)">
    <div id="excelPreview" style="display:none;font-size:12px;color:var(--success);margin-bottom:12px"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalNewProject')">Cancelar</button>
      <button class="btn btn-primary" onclick="createProject()">Crear proyecto</button>
    </div>
  </div>
</div>

<!-- Print area -->
<div class="print-preview" id="printArea"></div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vbbvftdiusiydfcfcuie.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiYnZmdGRpdXNpeWRmY2ZjdWllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTU3NDEsImV4cCI6MjA5MDQ3MTc0MX0.n8qtGhIK2-yKw7IC9m4XeEBUuZ2aC89VdELvkRBA4ck';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let projects = [];
let currentProject = null;
let excelBultos = null;

// ---- Load projects ----
async function loadProjects() {
  document.getElementById('loadingProjects').style.display = 'inline-block';
  const { data, error } = await db.from('proyectos').select('*, bultos(id, escaneado)').order('fecha_creacion', { ascending: false });
  document.getElementById('loadingProjects').style.display = 'none';
  if (error) return showToast('Error cargando proyectos', 'error');
  projects = data;
  renderProjectList();
}

function renderProjectList() {
  const list = document.getElementById('projectList');
  if (!projects.length) {
    list.innerHTML = '<div class="no-projects">No hay proyectos aún.<br>Creá el primero ↗</div>';
    return;
  }
  list.innerHTML = projects.map(p => {
    const total = p.bultos?.length || 0;
    const done = p.bultos?.filter(b => b.escaneado).length || 0;
    const pct = total ? Math.round(done / total * 100) : 0;
    const complete = done === total && total > 0;
    return `
      <div class="project-card ${currentProject?.id === p.id ? 'active' : ''}" onclick="selectProject('${p.id}')">
        <div class="project-card-name">${p.nombre}</div>
        <div class="project-card-meta">
          <span class="badge ${complete ? 'badge-complete' : 'badge-pending'}">${complete ? 'COMPLETO' : 'PENDIENTE'}</span>
          <span class="progress-mini">${done}/${total} bultos</span>
        </div>
      </div>
    `;
  }).join('');
}

async function selectProject(id) {
  currentProject = projects.find(p => p.id === id);
  renderProjectList();
  await loadProjectDetail(id);
}

async function loadProjectDetail(id) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state"><div class="loading"></div></div>';

  const { data: bultos, error } = await db.from('bultos').select('*').eq('proyecto_id', id).order('numero');
  if (error) return showToast('Error cargando bultos', 'error');

  const p = currentProject;
  const total = bultos.length;
  const done = bultos.filter(b => b.escaneado).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const complete = done === total && total > 0;

  const fecha = new Date(p.fecha_creacion).toLocaleDateString('es-UY', { day: '2-digit', month: 'short', year: 'numeric' });

  content.innerHTML = `
    <div class="project-detail-header">
      <div>
        <div class="project-detail-name">${p.nombre}</div>
        <div class="project-detail-date">${fecha}${p.descripcion ? ' · ' + p.descripcion : ''}</div>
      </div>
      <div class="action-bar">
        <button class="btn btn-secondary btn-sm" onclick="shareProject()">🔗 Compartir</button>
        <button class="btn btn-secondary btn-sm" onclick="printLabels()">🖨 Imprimir etiquetas</button>
        <button class="btn btn-secondary btn-sm" onclick="resetProject()">↺ Resetear</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProject()">🗑 Eliminar</button>
      </div>
    </div>

    <div class="progress-bar-container">
      <div class="progress-stats">
        <div class="stat">
          <div class="stat-value">${done}</div>
          <div class="stat-label">Escaneados</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:var(--muted)">${total - done}</div>
          <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Total bultos</div>
        </div>
        <div class="stat">
          <div class="stat-value">${pct}%</div>
          <div class="stat-label">Progreso</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${complete ? 'complete' : ''}" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="section-title">Bultos</div>
    <div class="bulto-grid">
      ${bultos.map(b => `
        <div class="bulto-card ${b.escaneado ? 'scanned' : ''}">
          <div class="bulto-num">#${String(b.numero).padStart(2,'0')}</div>
          ${b.descripcion ? `<div class="bulto-desc">${b.descripcion}</div>` : ''}
          <div class="bulto-status">${b.escaneado ? '✓ ESCANEADO' : '— PENDIENTE'}</div>
          ${b.fecha_escaneo ? `<div class="bulto-desc" style="font-size:10px">${new Date(b.fecha_escaneo).toLocaleString('es-UY')}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;

  // Store bultos for print
  window._currentBultos = bultos;
}

// ---- Create project ----
function openNewProject() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('newProjectDesc').value = '';
  document.getElementById('newBultoCount').value = '';
  document.getElementById('newBultoDesc').value = '';
  document.getElementById('excelPreview').style.display = 'none';
  excelBultos = null;
  openModal('modalNewProject');
}

async function createProject() {
  const nombre = document.getElementById('newProjectName').value.trim();
  if (!nombre) return showToast('El nombre es requerido', 'error');

  const desc = document.getElementById('newProjectDesc').value.trim();
  const count = parseInt(document.getElementById('newBultoCount').value);
  const bultoDesc = document.getElementById('newBultoDesc').value.trim();

  // Insert project
  const { data: proj, error } = await db.from('proyectos').insert({ nombre, descripcion: desc }).select().single();
  if (error) return showToast('Error creando proyecto: ' + error.message, 'error');

  // Build bultos
  let bultos = [];
  if (excelBultos) {
    bultos = excelBultos.map(b => ({ proyecto_id: proj.id, numero: b.numero, descripcion: b.descripcion || null }));
  } else if (count > 0) {
    for (let i = 1; i <= count; i++) {
      bultos.push({ proyecto_id: proj.id, numero: i, descripcion: bultoDesc || null });
    }
  }

  if (bultos.length > 0) {
    const { error: e2 } = await db.from('bultos').insert(bultos);
    if (e2) return showToast('Error creando bultos: ' + e2.message, 'error');
  }

  closeModal('modalNewProject');
  showToast('Proyecto creado ✓', 'success');
  await loadProjects();
  selectProject(proj.id);
}

// ---- Excel ----
function loadExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws);
    excelBultos = data.map((row, i) => ({
      numero: row.numero || row.Numero || row.NUMERO || (i + 1),
      descripcion: row.descripcion || row.Descripcion || row.DESCRIPCION || ''
    }));
    const preview = document.getElementById('excelPreview');
    preview.style.display = 'block';
    preview.textContent = `✓ ${excelBultos.length} bultos cargados desde Excel`;
    document.getElementById('newBultoCount').value = '';
    document.getElementById('newBultoCount').disabled = true;
  };
  reader.readAsBinaryString(file);
}

// ---- Print ----
async function printLabels() {
  if (!currentProject || !window._currentBultos) return;
  const bultos = window._currentBultos;
  const proyecto = currentProject.nombre;

  const printArea = document.getElementById('printArea');
  printArea.innerHTML = '';
  printArea.style.display = 'block';

  const grid = document.createElement('div');
  grid.className = 'print-grid';

  for (const b of bultos) {
    const label = document.createElement('div');
    label.className = 'print-label';

    // QR container
    const qrDiv = document.createElement('div');
    qrDiv.style.width = '98px';
    qrDiv.style.height = '98px';
    qrDiv.style.flexShrink = '0';

    const qrData = JSON.stringify({ pid: currentProject.id, bid: b.id, num: b.numero });
    new QRCode(qrDiv, { text: qrData, width: 98, height: 98, correctLevel: QRCode.CorrectLevel.M });

    // Info column
    const info = document.createElement('div');
    info.className = 'print-label-info';

    const pName = document.createElement('div');
    pName.className = 'label-project';
    pName.textContent = proyecto;

    const num = document.createElement('div');
    num.className = 'label-num';
    num.textContent = `BULTO ${String(b.numero).padStart(2,'0')}`;

    const total = document.createElement('div');
    total.className = 'label-total';
    total.textContent = `de ${String(bultos.length).padStart(2,'0')}`;

    info.appendChild(pName);
    info.appendChild(num);
    info.appendChild(total);

    if (b.descripcion) {
      const desc = document.createElement('div');
      desc.className = 'label-desc';
      desc.textContent = b.descripcion;
      info.appendChild(desc);
    }

    label.appendChild(qrDiv);
    label.appendChild(info);
    grid.appendChild(label);
  }

  printArea.appendChild(grid);

  setTimeout(() => {
    window.print();
    setTimeout(() => { printArea.style.display = 'none'; printArea.innerHTML = ''; }, 3000);
  }, 800);
}

// ---- Share ----
function shareProject() {
  if (!currentProject) return;
  const base = window.location.href.replace('admin.html', 'operario.html');
  const url = `${base}?proyecto=${currentProject.id}`;
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copiado al portapapeles ✓', 'success');
  }).catch(() => {
    prompt('Copiá este link:', url);
  });
}

// ---- Reset ----
async function resetProject() {
  if (!currentProject) return;
  if (!confirm('¿Resetear todos los escaneos de este proyecto?')) return;
  const { error } = await db.from('bultos').update({ escaneado: false, fecha_escaneo: null }).eq('proyecto_id', currentProject.id);
  if (error) return showToast('Error: ' + error.message, 'error');
  showToast('Proyecto reseteado ✓', 'success');
  await loadProjects();
  await loadProjectDetail(currentProject.id);
}

// ---- Delete ----
async function deleteProject() {
  if (!currentProject) return;
  if (!confirm(`¿Eliminar el proyecto "${currentProject.nombre}"? Esta acción no se puede deshacer.`)) return;
  const { error } = await db.from('proyectos').delete().eq('id', currentProject.id);
  if (error) return showToast('Error: ' + error.message, 'error');
  showToast('Proyecto eliminado', 'success');
  currentProject = null;
  document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Seleccioná un proyecto</div></div>';
  await loadProjects();
}

// ---- Realtime ----
db.channel('bultos-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'bultos' }, () => {
  loadProjects();
  if (currentProject) loadProjectDetail(currentProject.id);
}).subscribe();

// ---- Helpers ----
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', (e) => { if (e.target === el) el.classList.remove('open'); });
});

loadProjects();
</script>
