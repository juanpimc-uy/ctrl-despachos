<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CTRL DESPACHOS — Escaneo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #d4ff00;
    --text: #f0f0f0;
    --muted: #666;
    --success: #00e676;
    --danger: #ff3d3d;
    --warning: #ffb800;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ===== SCREEN SYSTEM ===== */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ===== HEADER ===== */
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .back-btn:hover { color: var(--text); }

  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .logo span { color: var(--muted); }

  /* ===== SCREEN 1: Proyectos ===== */
  .screen-intro {
    padding: 32px 20px 0;
  }

  .intro-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .intro-title {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 28px;
  }

  .project-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
  }

  .project-item {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 10px;
    cursor: pointer;
    background: var(--surface);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .project-item:active { transform: scale(0.98); border-color: var(--accent); }

  .project-item-left { flex: 1; }

  .project-item-name {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .project-item-meta {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 700;
  }

  .badge-pending { background: #2a2000; color: var(--warning); border: 1px solid #3a3000; }
  .badge-complete { background: #002a10; color: var(--success); border: 1px solid #003a18; }

  .progress-text {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .arrow {
    color: var(--muted);
    font-size: 18px;
  }

  .progress-bar-mini {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .progress-bar-mini-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .progress-bar-mini-fill.complete { background: var(--success); }

  /* ===== SCREEN 2: Scanner ===== */
  .scanner-project-info {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .scanner-project-name {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .scanner-progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .scanner-progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .scanner-pct {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-fill.complete { background: var(--success); }

  /* QR Scanner */
  .scanner-area {
    position: relative;
    background: #000;
    overflow: hidden;
  }

  #qr-reader {
    width: 100%;
  }

  #qr-reader video {
    width: 100% !important;
    height: auto !important;
  }

  .scanner-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scanner-frame {
    width: 200px;
    height: 200px;
    border: 2px solid var(--accent);
    border-radius: 12px;
    position: relative;
  }

  .scanner-frame::before, .scanner-frame::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    border-color: var(--accent);
    border-style: solid;
  }

  /* Scanner status */
  .scanner-status {
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.ready { background: var(--accent); animation: pulse 2s infinite; }
  .status-dot.success { background: var(--success); }
  .status-dot.error { background: var(--danger); }
  .status-dot.warning { background: var(--warning); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 14px;
    flex: 1;
  }

  .status-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'Space Mono', monospace;
  }

  /* Bultos list */
  .bultos-section {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .bultos-section::-webkit-scrollbar { width: 3px; }
  .bultos-section::-webkit-scrollbar-track { background: transparent; }
  .bultos-section::-webkit-scrollbar-thumb { background: var(--border); }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .bulto-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    transition: all 0.2s;
  }

  .bulto-row:last-child { border-bottom: none; }

  .bulto-row.just-scanned {
    background: #002a10;
    margin: 0 -20px;
    padding: 10px 20px;
    border-radius: 0;
  }

  .bulto-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    transition: all 0.2s;
  }

  .bulto-check.done {
    background: var(--success);
    border-color: var(--success);
    color: #000;
  }

  .bulto-row-info { flex: 1; }

  .bulto-row-num {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
  }

  .bulto-row.scanned .bulto-row-num { color: var(--success); }

  .bulto-row-desc {
    font-size: 11px;
    color: var(--muted);
  }

  .bulto-row-time {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* Complete overlay */
  .complete-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 230, 118, 0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    max-width: 480px;
    margin: 0 auto;
  }

  .complete-overlay.show { opacity: 1; pointer-events: all; }

  .complete-icon { font-size: 72px; margin-bottom: 16px; }
  .complete-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--success);
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }

  .complete-sub { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #c8f200; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }

  /* Loading */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px 20px;
    color: var(--muted);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-list {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* Flash feedback */
  .flash {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    max-width: 480px;
    margin: 0 auto;
  }

  .flash.success-flash { background: rgba(0, 230, 118, 0.3); }
  .flash.error-flash { background: rgba(255, 61, 61, 0.3); }
  .flash.show { opacity: 1; }
</style>
</head>
<body>

<!-- SCREEN 1: Proyectos -->
<div class="screen active" id="screen-projects">
  <div class="header">
    <div class="logo">CTRL<span>/</span>DESPACHOS</div>
  </div>
  <div class="screen-intro">
    <div class="intro-label">Operario</div>
    <div class="intro-title">Seleccioná<br>el proyecto</div>
  </div>
  <div class="project-list" id="projectList">
    <div class="loading-screen">
      <div class="spinner"></div>
      <span>Cargando proyectos...</span>
    </div>
  </div>
</div>

<!-- SCREEN 2: Scanner -->
<div class="screen" id="screen-scanner">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <span class="header-title" id="scanner-header-title">Escaneo</span>
  </div>

  <div class="scanner-project-info">
    <div class="scanner-project-name" id="scanner-project-name">—</div>
    <div class="scanner-progress-row">
      <span class="scanner-progress-text" id="scanner-progress-text">0 de 0 bultos</span>
      <span class="scanner-pct" id="scanner-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="scanner-progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="scanner-area">
    <div id="qr-reader"></div>
    <div class="scanner-overlay">
      <div class="scanner-frame"></div>
    </div>
  </div>

  <div class="scanner-status">
    <div class="status-dot ready" id="status-dot"></div>
    <div>
      <div class="status-text" id="status-text">Apuntá la cámara al QR del bulto</div>
      <div class="status-sub" id="status-sub"></div>
    </div>
  </div>

  <div class="bultos-section">
    <div class="section-label">Bultos</div>
    <div id="bulto-list"></div>
  </div>

  <div class="complete-overlay" id="complete-overlay">
    <div class="complete-icon">✅</div>
    <div class="complete-title">¡COMPLETO!</div>
    <div class="complete-sub" id="complete-sub">Todos los bultos escaneados</div>
    <button class="btn btn-primary" onclick="closeComplete()">Volver a proyectos</button>
  </div>
</div>

<!-- Flash feedback -->
<div class="flash" id="flash"></div>

<script>
const SUPABASE_URL = 'https://vbbvftdiusiydfcfcuie.supabase.co';
const SUPABASE_KEY = 'sb_publishable__Y87c8Ljucp09opRtRQpow_Wg01U-VG0LGw3sFVUV2axFadl6';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentProject = null;
let bultos = [];
let scanner = null;
let isProcessing = false;
let lastScanned = null;

// ===== SCREEN 1: Projects =====
async function loadProjects() {
  const list = document.getElementById('projectList');
  const { data, error } = await db.from('proyectos').select('*, bultos(id, escaneado)').order('fecha_creacion', { ascending: false });

  if (error) {
    list.innerHTML = '<div class="empty-list">Error cargando proyectos.<br>Verificá la conexión.</div>';
    return;
  }

  const pendientes = data.filter(p => {
    const total = p.bultos?.length || 0;
    const done = p.bultos?.filter(b => b.escaneado).length || 0;
    return !(done === total && total > 0);
  });

  const completos = data.filter(p => {
    const total = p.bultos?.length || 0;
    const done = p.bultos?.filter(b => b.escaneado).length || 0;
    return done === total && total > 0;
  });

  if (!data.length) {
    list.innerHTML = '<div class="empty-list">No hay proyectos activos.<br>El administrador debe crear uno.</div>';
    return;
  }

  const render = (arr) => arr.map(p => {
    const total = p.bultos?.length || 0;
    const done = p.bultos?.filter(b => b.escaneado).length || 0;
    const pct = total ? Math.round(done / total * 100) : 0;
    const complete = done === total && total > 0;
    return `
      <div class="project-item" onclick="startScanning('${p.id}')">
        <div class="project-item-left">
          <div class="project-item-name">${p.nombre}</div>
          <div class="project-item-meta">
            <span class="badge ${complete ? 'badge-complete' : 'badge-pending'}">${complete ? 'COMPLETO' : 'PENDIENTE'}</span>
            <span class="progress-text">${done}/${total}</span>
          </div>
          <div class="progress-bar-mini">
            <div class="progress-bar-mini-fill ${complete ? 'complete' : ''}" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="arrow">›</div>
      </div>
    `;
  }).join('');

  list.innerHTML = render(pendientes) + (completos.length ? `<div style="padding:12px 0 6px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase">Completados</div>` + render(completos) : '');
}

// ===== SCREEN 2: Scanner =====
async function startScanning(projectId) {
  const { data: proj } = await db.from('proyectos').select('*').eq('id', projectId).single();
  const { data: b } = await db.from('bultos').select('*').eq('proyecto_id', projectId).order('numero');
  currentProject = proj;
  bultos = b || [];

  document.getElementById('scanner-header-title').textContent = proj.nombre;
  document.getElementById('scanner-project-name').textContent = proj.nombre;

  updateProgress();
  renderBultoList();
  showScreen('screen-scanner');

  // Init QR scanner
  setTimeout(initScanner, 300);
}

function initScanner() {
  if (scanner) {
    scanner.clear();
    scanner = null;
  }

  scanner = new Html5Qrcode('qr-reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 220, height: 220 } },
    onScanSuccess,
    (err) => {}
  ).catch(err => {
    setStatus('error', 'No se pudo acceder a la cámara', err.toString());
  });
}

async function onScanSuccess(decodedText) {
  if (isProcessing) return;

  let data;
  try { data = JSON.parse(decodedText); } catch { return; }
  if (!data.bid || !data.pid) return;
  if (data.pid !== currentProject.id) {
    setStatus('warning', 'QR de otro proyecto', 'Este bulto no pertenece al proyecto actual');
    flashScreen('error-flash');
    return;
  }

  const bulto = bultos.find(b => b.id === data.bid);
  if (!bulto) return;

  if (bulto.escaneado) {
    if (lastScanned === data.bid) return;
    lastScanned = data.bid;
    setStatus('warning', `Bulto #${String(bulto.numero).padStart(2,'0')} ya escaneado`, 'Este bulto ya fue registrado anteriormente');
    flashScreen('error-flash');
    setTimeout(() => { lastScanned = null; }, 2000);
    return;
  }

  isProcessing = true;
  lastScanned = data.bid;

  const { error } = await db.from('bultos').update({ escaneado: true, fecha_escaneo: new Date().toISOString() }).eq('id', data.bid);

  if (error) {
    setStatus('error', 'Error al registrar', error.message);
    isProcessing = false;
    return;
  }

  // Update local state
  const idx = bultos.findIndex(b => b.id === data.bid);
  bultos[idx].escaneado = true;
  bultos[idx].fecha_escaneo = new Date().toISOString();

  const done = bultos.filter(b => b.escaneado).length;
  const total = bultos.length;

  setStatus('success', `✓ Bulto #${String(bulto.numero).padStart(2,'0')} registrado`, `${done} de ${total} bultos escaneados`);
  flashScreen('success-flash');
  updateProgress();
  renderBultoList(data.bid);

  setTimeout(() => {
    isProcessing = false;
    lastScanned = null;
    if (done < total) setStatus('ready', 'Apuntá la cámara al QR del bulto', '');
  }, 1500);

  if (done === total) {
    setTimeout(() => {
      document.getElementById('complete-sub').textContent = `${total} bultos confirmados — ${currentProject.nombre}`;
      document.getElementById('complete-overlay').classList.add('show');
    }, 800);
  }
}

function updateProgress() {
  const total = bultos.length;
  const done = bultos.filter(b => b.escaneado).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const complete = done === total && total > 0;

  document.getElementById('scanner-progress-text').textContent = `${done} de ${total} bultos`;
  document.getElementById('scanner-pct').textContent = `${pct}%`;
  const fill = document.getElementById('scanner-progress-fill');
  fill.style.width = `${pct}%`;
  fill.className = `progress-fill ${complete ? 'complete' : ''}`;
}

function renderBultoList(justScannedId = null) {
  const list = document.getElementById('bulto-list');
  const pendientes = bultos.filter(b => !b.escaneado);
  const escaneados = bultos.filter(b => b.escaneado).reverse();
  const all = [...pendientes, ...escaneados];

  list.innerHTML = all.map(b => {
    const isJust = b.id === justScannedId;
    const hora = b.fecha_escaneo ? new Date(b.fecha_escaneo).toLocaleTimeString('es-UY', { hour: '2-digit', minute: '2-digit' }) : '';
    return `
      <div class="bulto-row ${b.escaneado ? 'scanned' : ''} ${isJust ? 'just-scanned' : ''}" id="bulto-${b.id}">
        <div class="bulto-check ${b.escaneado ? 'done' : ''}">
          ${b.escaneado ? '✓' : ''}
        </div>
        <div class="bulto-row-info">
          <div class="bulto-row-num">Bulto #${String(b.numero).padStart(2,'0')} de ${String(bultos.length).padStart(2,'0')}</div>
          ${b.descripcion ? `<div class="bulto-row-desc">${b.descripcion}</div>` : ''}
        </div>
        ${hora ? `<div class="bulto-row-time">${hora}</div>` : ''}
      </div>
    `;
  }).join('');

  if (justScannedId) {
    setTimeout(() => {
      const el = document.getElementById(`bulto-${justScannedId}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function setStatus(type, text, sub = '') {
  const dot = document.getElementById('status-dot');
  dot.className = `status-dot ${type === 'ready' ? 'ready' : type === 'success' ? 'success' : type === 'error' ? 'error' : 'warning'}`;
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-sub').textContent = sub;
}

function flashScreen(cls) {
  const f = document.getElementById('flash');
  f.className = `flash ${cls} show`;
  setTimeout(() => f.className = `flash ${cls}`, 200);
}

function closeComplete() {
  document.getElementById('complete-overlay').classList.remove('show');
  goBack();
}

function goBack() {
  if (scanner) {
    scanner.stop().catch(() => {});
    scanner = null;
  }
  currentProject = null;
  bultos = [];
  showScreen('screen-projects');
  loadProjects();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Realtime updates
db.channel('bultos-operario').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bultos' }, (payload) => {
  if (!currentProject) return;
  const b = bultos.find(x => x.id === payload.new.id);
  if (b) {
    b.escaneado = payload.new.escaneado;
    b.fecha_escaneo = payload.new.fecha_escaneo;
    updateProgress();
    renderBultoList();
  }
}).subscribe();

loadProjects();
</script>
