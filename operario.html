<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CTRL DESPACHOS — Escaneo</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
  --accent: #FFD600; --text: #f0f0f0; --muted: #666;
  --success: #00e676; --danger: #ff3d3d; --warning: #ffb800;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; font-size: 16px; max-width: 480px; margin: 0 auto; min-height: 100vh; }
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }
.header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
.back-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 4px 8px; }
.logo { font-family: "Space Mono", monospace; font-size: 13px; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
.intro { padding: 28px 20px 0; }
.intro-label { font-family: "Space Mono", monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.intro-title { font-size: 26px; font-weight: 600; margin-bottom: 24px; }
.project-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
.project-item { border: 1px solid var(--border); border-radius: 12px; padding: 18px 16px; margin-bottom: 12px; cursor: pointer; background: var(--surface); display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: border-color 0.15s; min-height: 72px; }
.project-item:active { border-color: var(--accent); }
.project-name { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.project-meta { display: flex; gap: 10px; align-items: center; }
.badge { font-family: "Space Mono", monospace; font-size: 11px; padding: 4px 10px; border-radius: 4px; font-weight: 700; }
.badge-pending { background: #2a1f00; color: var(--warning); border: 1px solid #3a2d00; }
.badge-complete { background: #002a10; color: var(--success); border: 1px solid #003a18; }
.progress-text { font-size: 12px; color: var(--muted); font-family: "Space Mono", monospace; }
.bar-mini { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.bar-mini-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.bar-mini-fill.done { background: var(--success); }
.arrow { color: var(--muted); font-size: 20px; }
.proj-info { padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
.proj-name { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.prog-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
.prog-txt { font-family: "Space Mono", monospace; font-size: 12px; color: var(--muted); }
.prog-pct { font-family: "Space Mono", monospace; font-size: 12px; font-weight: 700; color: var(--accent); }
.prog-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.prog-fill.done { background: var(--success); }
#qr-reader { width: 100%; background: #000; }
#qr-reader video { width: 100% !important; }
.status { padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 58px; display: flex; align-items: center; gap: 10px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ready { background: var(--accent); animation: pulse 2s infinite; }
.dot.ok { background: var(--success); }
.dot.err { background: var(--danger); }
.dot.warn { background: var(--warning); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-txt { font-size: 16px; }
.status-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: "Space Mono", monospace; }
.bultos-list { flex: 1; overflow-y: auto; padding: 14px 20px; }
.sec-label { font-family: "Space Mono", monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
.bulto-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.bulto-row:last-child { border-bottom: none; }
.bulto-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; transition: all 0.2s; }
.bulto-check.done { background: var(--success); border-color: var(--success); color: #000; }
.bulto-num { font-family: "Space Mono", monospace; font-size: 14px; font-weight: 700; }
.bulto-row.scanned .bulto-num { color: var(--success); }
.bulto-desc { font-size: 11px; color: var(--muted); }
.bulto-time { font-size: 10px; color: var(--muted); font-family: "Space Mono", monospace; margin-left: auto; }
.complete-overlay { position: fixed; inset: 0; background: rgba(0,230,118,0.12); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.4s; max-width: 480px; margin: 0 auto; }
.complete-overlay.show { opacity: 1; pointer-events: all; }
.complete-icon { font-size: 72px; margin-bottom: 12px; }
.complete-title { font-size: 32px; font-weight: 700; color: var(--success); margin-bottom: 8px; font-family: "Space Mono", monospace; }
.complete-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; text-align: center; padding: 0 20px; }
.btn { display: inline-flex; align-items: center; padding: 12px 24px; min-height: 48px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; border: none; font-family: "DM Sans", sans-serif; }
.btn-primary { background: var(--accent); color: #000; }
.loading-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.flash { position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.1s; max-width: 480px; margin: 0 auto; }
.flash.ok { background: rgba(0,230,118,0.25); }
.flash.bad { background: rgba(255,61,61,0.25); }
.flash.show { opacity: 1; }
</style>
</head>

<script>
const URL_ = 'https://vbbvftdiusiydfcfcuie.supabase.co';
const KEY_ = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiYnZmdGRpdXNpeWRmY2ZjdWllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTU3NDEsImV4cCI6MjA5MDQ3MTc0MX0.n8qtGhIK2-yKw7IC9m4XeEBUuZ2aC89VdELvkRBA4ck';
const H = { 'apikey': KEY_, 'Authorization': 'Bearer ' + KEY_ };

let proj = null, bultos = [], scanner = null, busy = false, lastId = null;

async function api(path) {
  const r = await fetch(URL_ + '/rest/v1/' + path, { headers: H });
  return r.json();
}

async function loadProjects() {
  const list = document.getElementById('project-list');
  try {
    const data = await api('proyectos?select=*,bultos(id,escaneado)&order=fecha_creacion.desc');
    if (!Array.isArray(data)) throw new Error('bad response');
    if (!data.length) { list.innerHTML = '<div class="empty">No hay proyectos activos.</div>'; return; }

    const pending = data.filter(p => { const t=p.bultos?.length||0,d=p.bultos?.filter(b=>b.escaneado).length||0; return !(d===t&&t>0); });
    const done = data.filter(p => { const t=p.bultos?.length||0,d=p.bultos?.filter(b=>b.escaneado).length||0; return d===t&&t>0; });

    const card = p => {
      const t=p.bultos?.length||0, d=p.bultos?.filter(b=>b.escaneado).length||0;
      const pct=t?Math.round(d/t*100):0, c=d===t&&t>0;
      return `<div class="project-item" onclick="startScan('${p.id}')">
        <div style="flex:1">
          <div class="project-name">${p.nombre}</div>
          <div class="project-meta">
            <span class="badge ${c?'badge-complete':'badge-pending'}">${c?'COMPLETO':'PENDIENTE'}</span>
            <span class="progress-text">${d}/${t}</span>
          </div>
          <div class="bar-mini"><div class="bar-mini-fill ${c?'done':''}" style="width:${pct}%"></div></div>
        </div>
        <div class="arrow">›</div>
      </div>`;
    };

    list.innerHTML = pending.map(card).join('') +
      (done.length ? '<div style="padding:10px 0 4px;font-family:Space Mono,monospace;font-size:10px;letter-spacing:2px;color:var(--muted)">COMPLETADOS</div>' + done.map(card).join('') : '');

    // auto-open from URL
    const pid = new URLSearchParams(location.search).get('proyecto');
    if (pid && data.find(p => p.id === pid)) startScan(pid);

  } catch(e) {
    list.innerHTML = '<div class="empty">Error de conexión.<br>Recargá la página.</div>';
  }
}

async function startScan(projectId) {
  try {
    const [projs, bs] = await Promise.all([
      api('proyectos?id=eq.' + projectId + '&limit=1'),
      api('bultos?proyecto_id=eq.' + projectId + '&order=numero')
    ]);
    proj = projs[0];
    bultos = bs;
  } catch(e) { alert('Error cargando proyecto.'); return; }

  document.getElementById('hdr-title').textContent = proj.nombre;
  document.getElementById('proj-name').textContent = proj.nombre;
  updateProgress();
  renderBultos();
  showScreen('s-scanner');
  setTimeout(initScanner, 400);
}

function initScanner() {
  if (scanner) { scanner.clear(); scanner = null; }
  scanner = new Html5Qrcode('qr-reader');
  scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: 220 }, onScan, ()=>{})
    .catch(() => setStatus('err', 'No se pudo acceder a la cámara', ''));
}

async function onScan(text) {
  if (busy) return;
  let d;
  try { d = JSON.parse(text); } catch { return; }
  if (!d.bid || !d.pid) return;
  if (d.pid !== proj.id) { setStatus('warn','QR de otro proyecto',''); flash('bad'); return; }
  const b = bultos.find(x => x.id === d.bid);
  if (!b) return;
  if (b.escaneado) {
    if (lastId === d.bid) return;
    lastId = d.bid;
    setStatus('warn', `Bulto #${String(b.numero).padStart(2,'0')} ya escaneado`, '');
    flash('bad');
    setTimeout(() => { lastId = null; }, 2000);
    return;
  }
  busy = true;
  lastId = d.bid;
  try {
    await fetch(URL_ + '/rest/v1/bultos?id=eq.' + d.bid, {
      method: 'PATCH',
      headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ escaneado: true, fecha_escaneo: new Date().toISOString() })
    });
  } catch(e) { setStatus('err','Error al registrar',''); busy=false; return; }

  const idx = bultos.findIndex(x => x.id === d.bid);
  bultos[idx].escaneado = true;
  bultos[idx].fecha_escaneo = new Date().toISOString();

  const done = bultos.filter(x=>x.escaneado).length;
  setStatus('ok', `✓ Bulto #${String(b.numero).padStart(2,'0')} registrado`, `${done} de ${bultos.length} escaneados`);
  flash('ok');
  updateProgress();
  renderBultos(d.bid);

  setTimeout(() => { busy=false; lastId=null; if(done<bultos.length) setStatus('ready','Apuntá la cámara al QR del bulto',''); }, 1500);
  if (done === bultos.length) setTimeout(() => {
    document.getElementById('complete-sub').textContent = `${bultos.length} bultos confirmados`;
    document.getElementById('complete').classList.add('show');
  }, 800);
}

function updateProgress() {
  const t=bultos.length, d=bultos.filter(b=>b.escaneado).length, pct=t?Math.round(d/t*100):0;
  document.getElementById('prog-txt').textContent = d + ' de ' + t + ' bultos';
  document.getElementById('prog-pct').textContent = pct + '%';
  const f = document.getElementById('prog-fill');
  f.style.width = pct + '%';
  f.className = 'prog-fill' + (d===t&&t>0?' done':'');
}

function renderBultos(justId) {
  const sorted = [...bultos.filter(b=>!b.escaneado), ...bultos.filter(b=>b.escaneado).reverse()];
  document.getElementById('bulto-list').innerHTML = sorted.map(b => {
    const hora = b.fecha_escaneo ? new Date(b.fecha_escaneo).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="bulto-row ${b.escaneado?'scanned':''}">
      <div class="bulto-check ${b.escaneado?'done':''}">${b.escaneado?'✓':''}</div>
      <div>
        <div class="bulto-num">Bulto #${String(b.numero).padStart(2,'0')} de ${String(bultos.length).padStart(2,'0')}</div>
        ${b.descripcion?`<div class="bulto-desc">${b.descripcion}</div>`:''}
      </div>
      ${hora?`<div class="bulto-time">${hora}</div>`:''}
    </div>`;
  }).join('');
  if (justId) { const el = document.querySelector('.bulto-row.scanned'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }
}

function setStatus(type, txt, sub) {
  document.getElementById('dot').className = 'dot ' + type;
  document.getElementById('status-txt').textContent = txt;
  document.getElementById('status-sub').textContent = sub;
}

function flash(cls) {
  const f = document.getElementById('flash');
  f.className = 'flash ' + cls + ' show';
  setTimeout(() => f.className = 'flash ' + cls, 200);
}

function goBack() {
  document.getElementById('complete').classList.remove('show');
  if (scanner) { scanner.stop().catch(()=>{}); scanner = null; }
  proj = null; bultos = [];
  showScreen('s-projects');
  loadProjects();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Polling cada 60s
setInterval(() => {
  if (proj) api('bultos?proyecto_id=eq.' + proj.id + '&order=numero')
    .then(data => { if(Array.isArray(data)){bultos=data;updateProgress();renderBultos();} }).catch(()=>{});
}, 60000);

loadProjects();
</script>
</body>
</html>
